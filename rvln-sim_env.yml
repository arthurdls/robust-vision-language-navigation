# Conda environment for the simulator and LTL runner (rvln-sim).
# Usage: conda env create -f rvln-sim_env.yml
#        conda activate rvln-sim
# Then:  e.g. python scripts/run_integration.py or scripts/run_ltl.py (after starting the server).
#
# Depends on: OpenVLA server running (rvln-server env), Unreal env under runtime/unreal/,
#             and .env / .env.local for LLM API keys if using LTL/LLM.

name: rvln-sim

channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.10,<3.12
  - pip
  # LTL planner (Spot library)
  - spot
  # ffmpeg with libx264 for playback.mp4 encoding (write_frames_to_mp4
  # shells out to ffmpeg; the opencv-python wheel's bundled ffmpeg lacks
  # libx264).
  - ffmpeg

  - pip:
      # UAV-Flow-Eval / gym_unrealcv stack
      - "gymnasium"
      - unrealcv
      - opencv-python
      - matplotlib
      - numpy
      - scipy
      - pillow
      - flask
      - requests
      - pynput
      # LTL / LLM client stack (see src/rvln/ai)
      - openai
      - google-generativeai
      - huggingface-hub
      - jinja2
      - networkx
      - pandas
      - pydantic
      - scikit-learn
      - torch>=2.2.0
      - sentence-transformers
      - sympy
      - tqdm
      - websockets
      - beautifulsoup4
      - tenacity
      - imageio
      - imageio-ffmpeg
      - modelscope
